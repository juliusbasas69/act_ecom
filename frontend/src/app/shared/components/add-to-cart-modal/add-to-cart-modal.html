@if (visible && product) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4"
    (click)="onCancel()"
  >
    <div class="w-full max-w-md rounded-2xl bg-white shadow-2xl" (click)="$event.stopPropagation()">
      <!-- Header -->
      <div class="flex items-center gap-4 border-b border-slate-200 px-6 py-5">
        <div class="flex h-12 w-12 items-center justify-center rounded-full bg-sky-100">
          <i class="fa-solid fa-cart-shopping text-xl text-sky-600"></i>
        </div>

        <div>
          <h2 class="text-lg font-bold text-slate-800">Add to Cart</h2>

          <p class="text-sm text-slate-500">Review the item before adding it to your cart.</p>
        </div>
      </div>

      <!-- Body -->
      <div class="space-y-5 px-6 py-5">
        <!-- Product -->
        <div class="flex items-center gap-4">
          <div class="h-20 w-20 overflow-hidden rounded-xl bg-slate-100">
            @if (product.imageName) {
              <img
                [src]="'http://localhost:8080/api/file/products/images/' + product.imageName"
                class="h-full w-full object-cover"
              />
            } @else {
              <div class="flex h-full items-center justify-center">
                <i class="fa-solid fa-image text-3xl text-slate-300"></i>
              </div>
            }
          </div>

          <div class="flex-1">
            <h3 class="font-semibold text-slate-800">
              {{ product.productName }}
            </h3>

            <span
              class="mt-2 inline-block rounded-full px-3 py-1 text-xs font-semibold"
              [style.backgroundColor]="product.color + '20'"
              [style.color]="product.color"
            >
              {{ product.category }}
            </span>

            <p class="mt-2 text-lg font-bold text-sky-600">
              {{ product.price | currency: 'PHP' : 'symbol' : '1.2-2' }}
            </p>
          </div>
        </div>

        <div class="border-t border-slate-200"></div>

        <!-- Quantity -->
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700"> Quantity </label>

          <div class="flex items-center gap-3">
            <button
              (click)="decreaseQuantity()"
              class="flex h-10 w-10 items-center justify-center rounded-lg border border-slate-300 hover:bg-slate-100"
            >
              <i class="fa-solid fa-minus"></i>
            </button>

            <input
              class="w-20 rounded-lg border border-slate-300 py-2 text-center"
              type="number"
              min="1"
              [(ngModel)]="quantity"
            />

            <button
              (click)="increaseQuantity()"
              class="flex h-10 w-10 items-center justify-center rounded-lg border border-slate-300 hover:bg-slate-100"
            >
              <i class="fa-solid fa-plus"></i>
            </button>

            <span class="ml-auto text-sm text-slate-500"> Stock: {{ product.quantity }} </span>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="flex justify-end gap-3 border-t border-slate-200 px-6 py-4">
        <button
          (click)="onCancel()"
          class="rounded-lg border border-slate-300 px-4 py-2 font-medium text-slate-700 hover:bg-slate-100"
        >
          Cancel
        </button>

        <button
          (click)="onConfirm()"
          class="rounded-lg bg-sky-600 px-4 py-2 font-medium text-white transition hover:bg-sky-700"
        >
          <i class="fa-solid fa-cart-plus mr-2"></i>
          Add to Cart
        </button>
      </div>
    </div>
  </div>
}
