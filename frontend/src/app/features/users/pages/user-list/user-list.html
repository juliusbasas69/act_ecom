<div class="mx-auto max-w-7xl p-6">
  <!-- Header -->
  <div class="mb-6 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Users</h1>
      <p class="mt-1 text-sm text-slate-500">Manage registered users.</p>
    </div>

    <button
      class="rounded-xl bg-sky-600 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-sky-700"
    >
      + ADD USER
    </button>
  </div>

  <!-- Search -->
  <div class="mb-5">
    <div class="relative max-w-md">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-4.35-4.35M16 10a6 6 0 11-12 0 6 6 0 0112 0z"
        />
      </svg>

      <input
        type="text"
        placeholder="Search users..."
        class="w-full rounded-xl border border-sky-200 bg-white py-2.5 pl-10 pr-4 text-sm outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-100"
      />
    </div>
  </div>

  <!-- Table -->
  <div class="overflow-hidden rounded-2xl border border-sky-100 bg-white shadow-sm">
    <table class="w-full">
      <thead class="bg-sky-50">
        <tr class="text-left text-sm font-semibold text-slate-700">
          <th class="px-6 py-3">USER</th>
          <th class="px-6 py-3">ROLE</th>
          <th class="px-6 py-3">CREATED</th>
          <th class="px-6 py-3 text-center">ACTIONS</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        @for (user of users(); track user.userId) {
          <tr class="hover:bg-sky-50 transition">
            <td class="px-6 py-4">
              <div class="flex items-center gap-4">
                <div
                  class="flex h-11 w-11 items-center justify-center rounded-full bg-sky-100 font-semibold text-sky-700"
                >
                  {{ user.firstName.charAt(0).toUpperCase() }}
                </div>

                <div>
                  <p class="font-medium text-slate-800">
                    {{ user.firstName }} {{ user.familyName }}
                  </p>
                  <p class="text-sm text-slate-500">juan@email.com</p>
                </div>
              </div>
            </td>

            <td class="px-6 py-4">
              <span
                class="inline-flex items-center rounded-full bg-sky-100 px-3 py-1 text-xs font-semibold text-sky-700"
              >
                Administrator
              </span>
            </td>

            <td class="px-6 py-4 text-sm text-slate-500">Jul 3, 2026</td>

            <td class="px-6 py-4">
              <div class="flex justify-center gap-2">
                <!-- View -->
                <button
                  class="rounded-lg bg-sky-50 p-2 text-sky-600 transition hover:bg-sky-100"
                  title="View"
                >
                  <i class="fa-solid fa-eye"></i>
                </button>

                <!-- Edit -->
                <button
                  class="rounded-lg bg-amber-50 p-2 text-amber-600 transition hover:bg-amber-100"
                  title="Edit"
                >
                  <i class="fa-solid fa-pen-to-square"></i>
                </button>

                <!-- Delete -->
                <button
                  class="rounded-lg bg-red-50 p-2 text-red-600 transition hover:bg-red-100"
                  title="Delete"
                >
                  <i class="fa-solid fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
    @if (pagination(); as page) {
      <app-pagination [pagination]="page" (pageChange)="loadUsers($event)" [label]="'users'" />
    }
  </div>
</div>
