<div class="mx-auto max-w-7xl p-6">
  <!-- Hero -->
  <section
    class="overflow-hidden rounded-3xl bg-gradient-to-r from-sky-500 to-sky-400 px-10 py-14 text-white shadow-lg"
  >
    <div class="max-w-2xl">
      <span
        class="rounded-full bg-white/20 px-3 py-1 text-xs font-semibold uppercase tracking-widest"
      >
        New Collection
      </span>

      <h1 class="mt-5 text-5xl font-bold leading-tight">Shop Everything You Need</h1>

      <p class="mt-4 text-sky-100">
        Discover thousands of products with affordable prices and fast delivery.
      </p>

      <button
        class="mt-8 rounded-xl bg-white px-6 py-3 font-semibold text-sky-600 transition hover:bg-sky-100"
      >
        Shop Now
      </button>
    </div>
  </section>

  <!-- Categories -->
  <section class="mt-10">
    <div class="mb-5 flex items-center justify-between">
      <h2 class="text-2xl font-bold text-slate-800">Browse Categories</h2>

      <button class="text-sm font-semibold text-sky-600 hover:text-sky-700">View All</button>
    </div>

    <div class="flex gap-4 overflow-x-auto pb-2">
      @for (category of categories$ | async; track category.encryptedId) {
        <button
          class="flex min-w-[130px] flex-col items-center rounded-2xl border border-sky-100 bg-white p-5 shadow-sm transition hover:border-sky-300 hover:bg-sky-50"
        >
          <div
            class="flex h-14 w-14 items-center justify-center rounded-full"
            [style.backgroundColor]="category.color + '20'"
          >
            <i
              class="fa-solid text-xl"
              [ngClass]="category.icon || 'fa-circle-question'"
              [style.color]="category.color"
            ></i>
          </div>

          <span class="mt-3 font-medium text-slate-700">
            {{ category.categoryName }}
          </span>
        </button>
      }
    </div>
  </section>

  <!-- Products -->
  <section class="mt-12">
    <div class="mb-6 flex items-center justify-between">
      <h2 class="text-2xl font-bold text-slate-800">Featured Products</h2>

      <button class="text-sm font-semibold text-sky-600 hover:text-sky-700">View All</button>
    </div>

    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
      <!-- Product -->
      <div
        class="group overflow-hidden rounded-3xl border border-sky-100 bg-white shadow-sm transition hover:-translate-y-1 hover:shadow-xl"
      >
        <div class="flex h-60 items-center justify-center bg-slate-100">
          <i class="fa-solid fa-image text-5xl text-slate-300"></i>
        </div>

        <div class="p-5">
          <span class="rounded-full bg-sky-100 px-3 py-1 text-xs font-semibold text-sky-700">
            Electronics
          </span>

          <h3 class="mt-4 line-clamp-2 text-lg font-semibold text-slate-800">
            Wireless Mechanical Keyboard
          </h3>

          <div class="mt-3 flex items-center gap-2">
            <div class="text-xl font-bold text-sky-600">₱2,999</div>

            <div class="text-sm text-slate-400 line-through">₱3,499</div>
          </div>

          <div class="mt-4 flex items-center justify-between">
            <div class="text-sm text-amber-500">★★★★★</div>

            <span class="text-sm text-slate-400"> Stock: 25 </span>
          </div>

          <button
            class="mt-5 w-full rounded-xl bg-sky-600 py-3 font-semibold text-white transition hover:bg-sky-700"
          >
            <i class="fa-solid fa-cart-plus mr-2"></i>
            Add to Cart
          </button>
        </div>
      </div>

      <!-- Duplicate this card -->
    </div>
  </section>
</div>
