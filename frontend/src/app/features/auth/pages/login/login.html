<main class="min-h-screen bg-sky-100 flex items-center justify-center p-6">
  <div class="w-full max-w-md rounded-3xl bg-white p-8 shadow-2xl">
    <!-- Logo -->
    <div class="flex justify-center">
      <div class="flex h-20 w-20 items-center justify-center rounded-full bg-sky-100">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-10 w-10 text-sky-600"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 11c1.657 0 3-1.343 3-3S13.657 5 12 5 9 6.343 9 8s1.343 3 3 3zm0 2c-2.761 0-5 2.239-5 5h10c0-2.761-2.239-5-5-5z"
          />
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <div class="mt-6 text-center">
      <h1 class="text-3xl font-bold text-slate-800">Welcome Back</h1>
      <p class="mt-2 text-slate-500">Sign in to continue</p>
    </div>

    @if (sessionExpired()) {
      <div
        class="mt-4 rounded-xl border border-yellow-200 bg-yellow-50 p-4 text-center text-sm text-yellow-800"
      >
        ⚠️ Your session has expired. Please log in again.
      </div>
    }
    @if (!_isValid()) {
      <div
        class="mt-4 rounded-xl border border-red-200 bg-red-50 p-3 text-center text-sm text-red-700"
      >
        Invalid user or password
      </div>
    }

    <!-- Form -->
    <form class="mt-8 space-y-5" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Email -->
      <div>
        <label class="mb-2 block text-sm font-medium text-slate-700"> Email </label>

        <input
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="mb-2 block text-sm font-medium text-slate-700"> Password </label>

        <input
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200"
        />
      </div>

      <!-- Remember -->
      <!-- <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2">
          <input type="checkbox" />
          Remember me
        </label>

        <a href="#" class="text-sky-600 hover:underline"> Forgot password? </a>
      </div> -->

      <!-- Login -->
      <button
        type="submit"
        class="w-full rounded-xl bg-sky-500 py-3 font-semibold text-white transition hover:bg-sky-600 active:scale-95"
      >
        Login
      </button>
    </form>

    <!-- Divider
    <div class="my-6 flex items-center">
      <div class="h-px flex-1 bg-slate-300"></div>
      <span class="mx-4 text-sm text-slate-400">OR</span>
      <div class="h-px flex-1 bg-slate-300"></div>
    </div>

    <button
      class="flex w-full items-center justify-center gap-3 rounded-xl border border-slate-300 py-3 font-medium transition hover:bg-slate-100"
    >
      Continue with Google
    </button> -->

    <!-- Register -->
    <p class="mt-6 text-center text-sm text-slate-500">
      Don't have an account?
      <a routerLink="/register" class="font-semibold text-sky-600 hover:underline"> Register </a>
    </p>
  </div>
</main>
