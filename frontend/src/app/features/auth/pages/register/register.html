<main class="min-h-screen bg-sky-100 flex items-center justify-center p-6">
  <div class="w-full max-w-md rounded-3xl bg-white p-8 shadow-2xl">
    <!-- Logo -->
    <div class="flex justify-center">
      <div class="flex h-20 w-20 items-center justify-center rounded-full bg-sky-100">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-10 w-10 text-sky-600"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5 13l4 4L19 7"
          />
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <div class="mt-6 text-center">
      <h1 class="text-3xl font-bold text-slate-800">Create Account</h1>
      <p class="mt-2 text-slate-500">Register to get started</p>
    </div>

    <!-- Form -->
    <form class="mt-8 space-y-5">
      <!-- First & Last Name -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700"> First Name </label>

          <input
            type="text"
            placeholder="John"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200"
          />
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700"> Last Name </label>

          <input
            type="text"
            placeholder="Doe"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200"
          />
        </div>
      </div>

      <!-- Username -->
      <div>
        <label class="mb-2 block text-sm font-medium text-slate-700"> Username </label>

        <input
          type="text"
          placeholder="johndoe"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="mb-2 block text-sm font-medium text-slate-700"> Password </label>

        <input
          type="password"
          placeholder="Enter your password"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200"
        />
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="mb-2 block text-sm font-medium text-slate-700"> Confirm Password </label>

        <input
          type="password"
          placeholder="Confirm your password"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200"
        />
      </div>

      <!-- Register Button -->
      <button
        type="submit"
        class="w-full rounded-xl bg-sky-500 py-3 font-semibold text-white transition hover:bg-sky-600 active:scale-95"
      >
        Create Account
      </button>
    </form>

    <!-- Login Link -->
    <p class="mt-6 text-center text-sm text-slate-500">
      Already have an account?
      <a routerLink="/login" class="font-semibold text-sky-600 hover:underline"> Login </a>
    </p>
  </div>
</main>
