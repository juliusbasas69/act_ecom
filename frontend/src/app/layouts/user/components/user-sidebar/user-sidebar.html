<!-- Overlay -->
<div
  *ngIf="isSidebarOpen"
  class="fixed inset-0 z-40 bg-black/40 backdrop-blur-sm"
  (click)="onClose()"
></div>

<!-- Sidebar -->
<aside
  class="fixed left-0 top-0 z-50 flex h-full w-72 flex-col bg-white shadow-2xl transition-transform duration-300"
  [class.translate-x-0]="isSidebarOpen"
  [class.-translate-x-full]="!isSidebarOpen"
>
  <!-- Close button -->
  <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
    <!-- Logo / Title -->
    <div class="flex items-center gap-3">
      <div
        class="flex h-10 w-10 items-center justify-center rounded-full bg-sky-100 ring-2 ring-sky-200"
      >
        <i class="fa-solid fa-store text-sky-600"></i>
      </div>

      <div>
        <h2 class="text-base font-semibold text-slate-800">ACT E-Commerce</h2>
      </div>
    </div>

    <!-- Close -->
    <button
      (click)="onClose()"
      class="flex h-9 w-9 items-center justify-center rounded-full text-slate-400 transition-all duration-200 hover:bg-red-50 hover:text-red-500 active:scale-95"
      aria-label="Close sidebar"
    >
      <i class="fa-solid fa-xmark text-lg"></i>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto p-4">
    <!-- Dashboard -->
    <!-- Dashboard -->
    <div class="mb-6">
      <p class="mb-2 px-3 text-xs font-semibold uppercase tracking-wider text-slate-400">
        Dashboard
      </p>

      <a
        routerLink="/dashboard"
        routerLinkActive="bg-sky-100 text-sky-700"
        (click)="onClose()"
        class="group flex items-center gap-3 rounded-xl px-4 py-3 text-slate-600 transition hover:bg-sky-50"
      >
        <div
          class="flex h-8 w-8 items-center justify-center rounded-full bg-sky-100 ring-1 ring-sky-200"
        >
          <i class="fa-solid fa-chart-line text-sm text-sky-600"></i>
        </div>

        <span class="font-medium">Dashboard</span>
      </a>
    </div>

    <!-- Products -->
    <div class="mb-6">
      <p class="mb-2 px-3 text-xs font-semibold uppercase tracking-wider text-slate-400">
        Products
      </p>

      <a
        routerLink="/products"
        routerLinkActive="bg-sky-100 text-sky-700"
        (click)="onClose()"
        class="group flex items-center gap-3 rounded-xl px-4 py-3 text-slate-600 transition hover:bg-sky-50"
      >
        <div
          class="flex h-8 w-8 items-center justify-center rounded-full bg-sky-100 ring-1 ring-sky-200"
        >
          <i class="fa-solid fa-boxes-stacked text-sm text-sky-600"></i>
        </div>

        <span class="font-medium">Products</span>
      </a>
    </div>

    <!-- Orders -->
    <div>
      <p class="mb-2 px-3 text-xs font-semibold uppercase tracking-wider text-slate-400">Orders</p>

      <a
        routerLink="/admin/orders"
        routerLinkActive="bg-sky-100 text-sky-700"
        (click)="onClose()"
        class="group flex items-center gap-3 rounded-xl px-4 py-3 text-slate-600 transition hover:bg-sky-50"
      >
        <div
          class="flex h-8 w-8 items-center justify-center rounded-full bg-sky-100 ring-1 ring-sky-200"
        >
          <i class="fa-solid fa-cart-shopping text-sm text-sky-600"></i>
        </div>

        <span class="font-medium">Orders</span>
      </a>
    </div>
    <!-- System -->
    <div class="mt-6">
      <p class="mb-2 px-3 text-xs font-semibold uppercase tracking-wider text-slate-400">System</p>

      <!-- Activity Logs -->
      <a
        routerLink="/admin/activity-logs"
        routerLinkActive="bg-sky-100 text-sky-700"
        (click)="onClose()"
        class="group mt-2 flex items-center gap-3 rounded-xl px-4 py-3 text-slate-600 transition hover:bg-sky-50"
      >
        <div
          class="flex h-8 w-8 items-center justify-center rounded-full bg-sky-100 ring-1 ring-sky-200"
        >
          <i class="fa-solid fa-clock-rotate-left text-sm text-sky-600"></i>
        </div>

        <span class="font-medium">Activity Logs</span>
      </a>

      <!-- Settings -->
      <a
        routerLink="/admin/settings"
        routerLinkActive="bg-sky-100 text-sky-700"
        (click)="onClose()"
        class="group mt-2 flex items-center gap-3 rounded-xl px-4 py-3 text-slate-600 transition hover:bg-sky-50"
      >
        <div
          class="flex h-8 w-8 items-center justify-center rounded-full bg-sky-100 ring-1 ring-sky-200"
        >
          <i class="fa-solid fa-gear text-sm text-sky-600"></i>
        </div>

        <span class="font-medium">Settings</span>
      </a>
    </div>
  </nav>
</aside>
