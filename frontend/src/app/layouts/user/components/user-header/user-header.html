<header class="sticky top-0 z-50 border-b border-sky-200 bg-white shadow-sm">
  <div class="flex h-16 items-center justify-between px-6">
    <!-- LEFT: Burger + Logo -->
    <div class="flex items-center gap-3">
      <!-- Burger (ALWAYS visible) -->
      <button (click)="onToggleSidebar()" class="rounded-md p-2 hover:bg-sky-50 transition">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6 text-slate-700"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>

      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-full bg-sky-100">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6 text-sky-600"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9.75 3v2.25M14.25 3v2.25M3 9.75h18"
            />
          </svg>
        </div>

        <div class="hidden sm:block">
          <h1 class="text-lg font-bold text-slate-800">ACT E-Commerce</h1>
        </div>
      </a>
    </div>

    <!-- RIGHT -->
    <div class="flex items-center gap-4">
      <button
        class="rounded-xl bg-sky-500 px-4 py-2 text-white hover:bg-sky-600"
        (click)="onLogout()"
      >
        Logout
      </button>
    </div>
  </div>
</header>
