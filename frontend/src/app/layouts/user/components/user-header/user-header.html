<header
  class="sticky top-0 z-50 border-b border-sky-200 bg-gradient-to-r from-white to-sky-50 shadow-sm"
>
  <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-6">
    <!-- LEFT -->
    <div class="flex items-center gap-4">
      <!-- Burger -->
      <button (click)="onToggleSidebar()" class="rounded-lg p-2 transition hover:bg-sky-100">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6 text-slate-700"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>

      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-3">
        <div
          class="flex h-11 w-11 items-center justify-center rounded-full bg-sky-100 ring-2 ring-sky-200"
        >
          <i class="fa-solid fa-store text-sky-600"></i>
        </div>

        <div class="hidden sm:block">
          <div class="flex items-center gap-2">
            <h1 class="text-lg font-bold text-slate-800">ACT E-Commerce</h1>
          </div>

          <p class="text-xs text-slate-500">Dashboard</p>
        </div>
      </a>
    </div>

    <!-- RIGHT -->
    <div class="flex items-center gap-4">
      <div>
        <button
          class="rounded-lg p-2 text-slate-600 transition hover:bg-sky-100 hover:text-sky-600"
          title="Notifications"
        >
          <i class="fa-regular fa-bell text-xl"></i>
        </button>

        <button
          class="rounded-lg p-2 text-slate-600 transition hover:bg-sky-100 hover:text-sky-600"
          title="Cart"
        >
          <i class="fa-solid fa-cart-shopping text-xl"></i>
        </button>
      </div>
      <!-- Admin -->
      <div class="hidden items-center gap-3 md:flex">
        <div class="text-right">
          <p class="text-sm font-semibold text-slate-800">{{ this.authService.fullName() }}</p>
          <p class="text-xs text-slate-500">{{ authService.email() }}</p>
        </div>

        <div
          class="flex h-10 w-10 items-center justify-center rounded-full bg-sky-500 font-semibold text-white"
        >
          {{ initials }}
        </div>
      </div>

      <!-- Logout -->
      <button
        (click)="onLogout()"
        class="rounded-lg bg-red-500 px-4 py-2 text-sm font-medium text-white transition hover:bg-red-600 cursor-pointer"
      >
        LOGOUT
      </button>
    </div>
  </div>
</header>
