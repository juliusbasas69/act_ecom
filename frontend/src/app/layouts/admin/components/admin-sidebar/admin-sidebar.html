<!-- Overlay -->
<div
  *ngIf="isSidebarOpen"
  class="fixed inset-0 z-40 bg-black/40 backdrop-blur-sm"
  (click)="onClose()"
></div>

<!-- Sidebar -->
<aside
  class="fixed left-0 top-0 z-50 flex h-full w-72 flex-col bg-white shadow-2xl transition-transform duration-300"
  [class.translate-x-0]="isSidebarOpen"
  [class.-translate-x-full]="!isSidebarOpen"
>
  <!-- Header -->
  <div class="flex items-center justify-between border-b border-sky-100 px-5 py-4">
    <h2 class="text-lg font-bold text-slate-800">Admin Panel</h2>

    <button (click)="onClose()" class="rounded-lg p-2 transition hover:bg-slate-100">✕</button>
  </div>

  <!-- Profile -->
  <div class="border-b border-sky-100 px-5 py-6">
    <div class="flex items-center gap-3">
      <div
        class="flex h-12 w-12 items-center justify-center rounded-full bg-sky-100 text-lg font-bold text-sky-600"
      >
        JB
      </div>

      <div>
        <p class="font-semibold text-slate-800">Julius Basas</p>
        <p class="text-sm text-slate-500">Administrator</p>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 space-y-2 p-4">
    <a
      routerLink="/dashboard"
      routerLinkActive="bg-sky-100 text-sky-700"
      (click)="onClose()"
      class="flex items-center gap-3 rounded-xl px-4 py-3 text-slate-600 transition hover:bg-sky-50"
    >
      📊 Dashboard
    </a>

    <a
      routerLink="/products"
      routerLinkActive="bg-sky-100 text-sky-700"
      (click)="onClose()"
      class="flex items-center gap-3 rounded-xl px-4 py-3 text-slate-600 transition hover:bg-sky-50"
    >
      📦 Products
    </a>

    <a
      routerLink="/orders"
      routerLinkActive="bg-sky-100 text-sky-700"
      (click)="onClose()"
      class="flex items-center gap-3 rounded-xl px-4 py-3 text-slate-600 transition hover:bg-sky-50"
    >
      🛒 Orders
    </a>

    <a
      routerLink="/users"
      routerLinkActive="bg-sky-100 text-sky-700"
      (click)="onClose()"
      class="flex items-center gap-3 rounded-xl px-4 py-3 text-slate-600 transition hover:bg-sky-50"
    >
      👥 Users
    </a>
  </nav>

  <!-- Bottom -->
  <div class="border-t border-slate-200 p-4">
    <button
      class="flex w-full items-center gap-3 rounded-xl px-4 py-3 text-red-500 transition hover:bg-red-50"
    >
      🚪 Logout
    </button>
  </div>
</aside>
