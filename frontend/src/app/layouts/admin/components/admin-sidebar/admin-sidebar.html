<!-- Overlay -->
<div
  *ngIf="isSidebarOpen"
  class="fixed inset-0 z-40 bg-black/40 backdrop-blur-sm"
  (click)="onClose()"
></div>

<!-- Sidebar -->
<aside
  class="fixed left-0 top-0 z-50 flex h-full w-72 flex-col bg-white shadow-2xl transition-transform duration-300"
  [class.translate-x-0]="isSidebarOpen"
  [class.-translate-x-full]="!isSidebarOpen"
>
  <!-- Close button -->
  <div class="flex justify-end border-b border-slate-200 p-4">
    <button
      (click)="onClose()"
      class="rounded-lg p-2 text-slate-500 transition hover:bg-slate-100 hover:text-slate-700"
    >
      ✕
    </button>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto p-4">
    <!-- Dashboard -->
    <div class="mb-6">
      <p class="mb-2 px-3 text-xs font-semibold uppercase tracking-wider text-slate-400">
        Dashboard
      </p>

      <a
        routerLink="/admin/dashboard"
        routerLinkActive="bg-sky-100 text-sky-700"
        (click)="onClose()"
        class="flex items-center gap-3 rounded-xl px-4 py-3 text-slate-600 transition hover:bg-sky-50"
      >
        📊 Dashboard
      </a>
    </div>

    <!-- Users -->
    <div class="mb-6">
      <p class="mb-2 px-3 text-xs font-semibold uppercase tracking-wider text-slate-400">Users</p>

      <a
        routerLink="/admin/users"
        routerLinkActive="bg-sky-100 text-sky-700"
        (click)="onClose()"
        class="flex items-center gap-3 rounded-xl px-4 py-3 text-slate-600 transition hover:bg-sky-50"
      >
        👥 User List
      </a>
    </div>

    <!-- Products -->
    <div class="mb-6">
      <p class="mb-2 px-3 text-xs font-semibold uppercase tracking-wider text-slate-400">
        Products
      </p>

      <a
        routerLink="/admin/products"
        routerLinkActive="bg-sky-100 text-sky-700"
        (click)="onClose()"
        class="flex items-center gap-3 rounded-xl px-4 py-3 text-slate-600 transition hover:bg-sky-50"
      >
        📦 Product List
      </a>
    </div>

    <!-- Orders -->
    <div>
      <p class="mb-2 px-3 text-xs font-semibold uppercase tracking-wider text-slate-400">Orders</p>

      <a
        routerLink="/admin/orders"
        routerLinkActive="bg-sky-100 text-sky-700"
        (click)="onClose()"
        class="flex items-center gap-3 rounded-xl px-4 py-3 text-slate-600 transition hover:bg-sky-50"
      >
        🛒 Order List
      </a>
    </div>
  </nav>
</aside>
